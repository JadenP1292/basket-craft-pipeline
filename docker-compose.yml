# Basket Craft Data Pipeline
# MySQL (source) -> Python ETL -> PostgreSQL (destination)

services:
  # SOURCE: MySQL database simulating Basket Craft production
  mysql_source:
    image: mysql:8.0
    container_name: basket_craft_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: basket_craft
      MYSQL_USER: basket_craft_user
      MYSQL_PASSWORD: basket_craft_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/mysql_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # DESTINATION: PostgreSQL database for dashboard
  postgres_dest:
    image: postgres:16
    container_name: basket_craft_postgres
    environment:
      POSTGRES_DB: basket_craft_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"  # Using 5433 to avoid conflict with campus_bites_db on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d basket_craft_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  postgres_data:
